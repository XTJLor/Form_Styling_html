<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Gym Membership Form</title>

    <!-- Connects the CSS file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Main form container -->
    <div class="form-box">

        <h2>Gym Membership Form</h2>

        <form>

            <!-- First Name -->
            <label for="fname">First Name</label>
            <input type="text" id="fname" name="fname">

            <!-- Last Name -->
            <label for="lname">Last Name</label>
            <input type="text" id="lname" name="lname">

            <!-- Email -->
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email">

            <!-- Phone -->
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone">

            <!-- Membership -->
            <label for="membership">Membership Type</label>
            <select id="membership" name="membership">
                <option>Basic</option>
                <option>Premium</option>
                <option>Student</option>
            </select>

            <!-- Radio Buttons -->
            <label>Workout Time</label>

            <input type="radio" id="morning" name="time" value="Morning">
            <label for="morning">Morning</label>

            <input type="radio" id="evening" name="time" value="Evening">
            <label for="evening">Evening</label>

            <!-- Checkboxes -->
            <label>Extras</label>

            <input type="checkbox" id="trainer" name="extras" value="Trainer">
            <label for="trainer">Personal Trainer</label>

            <input type="checkbox" id="classes" name="extras" value="Classes">
            <label for="classes">Group Classes</label>

            <!-- Submit -->
            <input type="submit" value="Enter">

        </form>

    </div>

</body>

</html>
